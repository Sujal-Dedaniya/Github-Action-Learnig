name: Test GITHUB_ENV

on:
  push:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Set env variable
      - name: Set variable
        run: |
          echo "MY_NAME=Sujal" >> $GITHUB_ENV

      # Step 2: Direct access
      - name: Direct access
        run: |
          echo "Hello $MY_NAME"

      # Step 3: Using env block
      - name: Using env block
        env:
          USER_NAME: ${{ env.MY_NAME }}
        run: |
          echo "Mapped name is $USER_NAME"

      # Step 4: Using in YAML expression
      - name: YAML usage
        run: echo "Final check: ${{ env.MY_NAME }}"
