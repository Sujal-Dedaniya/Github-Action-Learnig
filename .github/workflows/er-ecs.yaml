name: ESR-TO-ECS

on:
  workflow_dispatch:

permissions:
  id-token: write   # REQUIRED for OIDC
  contents: read

env:
    ECR_REPOSITORY_DEV: demo-cr
    ECS_SERVICE_DEV: node-service
    ECS_CLUSTER_DEV: demo
    DEV_CONTAINER_NAME: node
    DEV_ECS_TASK_DEFINITION: .aws/TD-config.json

jobs:

  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: chechout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::607081650648:role/OidcsRoleForS3
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Create the private repository if it doesn't exist
        run: |
          aws ecr describe-repositories --repository-names demo-ecr \
          || aws ecr create-repository --repository-name demo-ecr

      - name: build-image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: demo-ecr
          IMAGE_TAG: ${{ github.run_number }}
        run: |
          # Build and Push Docker image
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_DEV:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1.5.1
        with:
            task-definition: ${{ env.DEV_ECS_TASK_DEFINITION }}
            container-name: ${{ env.DEV_CONTAINER_NAME }}
            image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2.1.0
        with:
            task-definition: ${{ steps.task-def.outputs.task-definition }}
            service: ${{ env.ECS_SERVICE_DEV }}
            cluster: ${{ env.ECS_CLUSTER_DEV }}



  
