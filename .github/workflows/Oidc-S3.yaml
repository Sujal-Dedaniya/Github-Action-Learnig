name: OIDC Demo - Create S3

on:
  workflow_dispatch: 

permissions:
  id-token: write   # REQUIRED for OIDC
  contents: read

jobs:
  create-bucket:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::607081650648:role/OidcsRoleForS3
          aws-region: ap-south-1

      - name: Create S3 Bucket
        run: |
          aws s3 mb s3://my-oidc-demo-bucket-12345
